<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>PvZ 2 Gacha World - Siêu Ổn Định</title>
    <style>
        :root {
            --common: #bdc3c7; --rare: #3498db; --epic: #9b59b6; --legendary: #f1c40f;
        }
        body { background: #121212; color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center;}
        #game-container { max-width: 900px; margin: 0 auto; background: #23272a; padding: 25px; border-radius: 20px; box-shadow: 0 0 40px rgba(0,0,0,0.8); border: 2px solid #444; }
        
        .header-stats { display: flex; justify-content: space-around; background: #2ecc71; padding: 15px; border-radius: 12px; margin-bottom: 25px; font-size: 20px; font-weight: bold; color: #111; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2); }
        
        .btn-zone { margin-bottom: 25px; }
        .btn { padding: 15px 30px; margin: 5px; cursor: pointer; border-radius: 10px; font-weight: bold; border: none; font-size: 18px; transition: 0.3s; }
        #btn-gacha { background: #e67e22; color: white; box-shadow: 0 5px 0 #d35400; }
        #btn-fight { background: #3498db; color: white; box-shadow: 0 5px 0 #2980b9; }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        .btn:disabled { background: #555; box-shadow: none; cursor: not-allowed; opacity: 0.6; }

        /* Nền trận đấu - Đã đổi thành link ảnh dự phòng ổn định */
        .battle-view { display: none; background: url('https://placehold.co/800x200/27ae60/ecf0f1?text=ARENA'); background-size: cover; padding: 30px; border-radius: 15px; margin-bottom: 20px; border: 4px solid #fff; position: relative; min-height: 200px; }
        .battle-flex { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: center; }
        
        .hp-container { width: 250px; text-align: center; }
        .hp-bar { height: 25px; background: #333; border: 2px solid #fff; border-radius: 15px; overflow: hidden; margin-top: 10px;}
        #hp-fill { height: 100%; background: #ff4757; width: 100%; transition: 0.4s; }

        .log-box { height: 120px; overflow-y: auto; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; font-family: monospace; font-size: 14px; color: #00ff00; border: 1px solid #444; margin-bottom: 20px; text-align: left; }

        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; padding: 10px; }
        .card { background: #2f3136; border: 3px solid #555; border-radius: 12px; padding: 10px; text-align: center; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 70px; height: 70px; object-fit: contain; }
        .card-name { font-size: 11px; font-weight: bold; margin: 5px 0; text-transform: uppercase; }
        .card-dmg { font-size: 12px; color: #ffab00; }

        .rarity-COMMON { border-color: var(--common); }
        .rarity-RARE { border-color: var(--rare); box-shadow: 0 0 5px var(--rare); }
        .rarity-EPIC { border-color: var(--epic); box-shadow: 0 0 10px var(--epic); }
        .rarity-LEGENDARY { border-color: var(--legendary); box-shadow: 0 0 20px var(--legendary); }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🌻 PvZ 2: Gacha World 🧟</h1>
    
    <div class="header-stats">
        <span>💎 Gems: <span id="gems">1000</span></span>
        <span>🌊 Wave: <span id="wave">1</span></span>
        <span>🎒 Cây: <span id="count">0</span></span>
    </div>

    <div class="btn-zone">
        <button class="btn" id="btn-gacha" onclick="rollGacha()">🎲 QUAY GACHA (100💎)</button>
        <button class="btn" id="btn-fight" onclick="startBattle()">⚔️ XUNG TRẬN!</button>
    </div>

    <div id="battle-area" class="battle-view">
        <div class="battle-flex">
            <div id="player-side" style="display: flex; gap: 5px; flex-wrap: wrap; width: 50%;"></div>
            <div class="hp-container">
                <img id="zombie-img" src="https://placehold.co/100/1a1a1a/fff?text=ZOMBIE" width="100" style="border-radius:10px;">
                <p id="zombie-name" style="font-weight:bold; margin: 5px 0;">Basic Zombie</p>
                <div class="hp-bar"><div id="hp-fill"></div></div>
                <small id="hp-text">100/100 HP</small>
            </div>
        </div>
    </div>

    <div class="log-box" id="log-box">Hệ thống: Phiên bản Siêu ổn định (Placeholders). Sẵn sàng!</div>

    <h3>Đội hình của bạn</h3>
    <div class="inventory-grid" id="inventory"></div>
</div>

<script>
    let gems = 1000;
    let wave = 1;
    let inventory = [];

    // CẬP NHẬT: Tất cả hình ảnh đã được đổi sang link dự phòngplacehold.co
    // Định dạng: placehold.co/70x70/[màu_nền]/[màu_chữ]?text=[Tên_Cây]
    const plantPool = [
        { name: "Peashooter", dmg: 20, rarity: "COMMON", img: "https://placehold.co/70x70/2ecc71/000?text=PEA" },
        { name: "Cabbage-pult", dmg: 25, rarity: "COMMON", img: "https://placehold.co/70x70/1e8449/fff?text=CABBAGE" },
        { name: "Sunflower", dmg: 5, rarity: "COMMON", img: "https://placehold.co/70x70/f1c40f/000?text=SUN" },
        { name: "Repeater", dmg: 50, rarity: "RARE", img: "https://placehold.co/70x70/27ae60/fff?text=REPEAT" },
        { name: "Snapdragon", dmg: 65, rarity: "RARE", img: "https://placehold.co/70x70/e67e22/000?text=SNAP" },
        { name: "Laser Bean", dmg: 130, rarity: "EPIC", img: "https://placehold.co/70x70/3498db/fff?text=LASER" },
        { name: "Electric Pea", dmg: 160, rarity: "EPIC", img: "https://placehold.co/70x70/f39c12/000?text=ELEC" },
        { name: "Winter Melon", dmg: 450, rarity: "LEGENDARY", img: "https://placehold.co/70x70/9b59b6/fff?text=WINTER" },
        { name: "Pokra", dmg: 600, rarity: "LEGENDARY", img: "https://placehold.co/70x70/e74c3c/fff?text=POKRA" }
    ];

    const zombieTypes = [
        { name: "Basic Zombie", hp: 150, color: "1a1a1a" },
        { name: "Conehead Zombie", hp: 350, color: "d35400" },
        { name: "Buckethead Zombie", hp: 800, color: "7f8c8d" },
        { name: "Gargantuar", hp: 3000, color: "c0392b" }
    ];

    function addLog(msg) {
        const box = document.getElementById('log-box');
        box.innerHTML = `> ${msg}<br>` + box.innerHTML;
    }

    function rollGacha() {
        if (gems < 100) { addLog("Hết tiền rồi! Hãy đi đánh Zombie."); return; }
        gems -= 100;
        
        let r = Math.random() * 100;
        let p;
        if (r < 65) p = plantPool[Math.floor(Math.random()*3)]; // Common
        else if (r < 90) p = plantPool[Math.floor(Math.random()*2)+3]; // Rare
        else if (r < 98) p = plantPool[Math.floor(Math.random()*2)+5]; // Epic
        else p = plantPool[Math.floor(Math.random()*2)+7]; // Legendary

        inventory.push({...p});
        addLog(`[GACHA] Chúc mừng! Bạn nhận được ${p.name}`);
        updateUI();
        renderInventory();
    }

    function renderInventory() {
        const grid = document.getElementById('inventory');
        if (inventory.length === 0) { grid.innerHTML = "<p>Bạn chưa có cây nào.</p>"; return; }
        grid.innerHTML = inventory.map(item => `
            <div class="card rarity-${item.rarity}">
                <img src="${item.img}" onerror="this.src='https://placehold.co/70x70?text=ERROR'">
                <div class="card-name">${item.name}</div>
                <div class="card-dmg">⚔️ ${item.dmg}</div>
            </div>
        `).join('');
    }

    function startBattle() {
        if (inventory.length === 0) { addLog("Chưa có cây!"); return; }
        
        document.getElementById('btn-fight').disabled = true;
        document.getElementById('btn-gacha').disabled = true;
        document.getElementById('battle-area').style.display = 'block';
        
        let zIdx = Math.min(Math.floor((wave-1)/5), 3);
        let zBase = zombieTypes[zIdx];
        let maxHp = zBase.hp + (wave * 50);
        let currentHp = maxHp;
        let totalDmg = inventory.reduce((s, p) => s + p.dmg, 0);

        document.getElementById('zombie-name').innerText = zBase.name;
        // Đổi màu Zombie placeholdertheo wave
        document.getElementById('zombie-img').src = `https://placehold.co/100/${zBase.color}/fff?text=ZOMBIE`;
        
        document.getElementById('player-side').innerHTML = inventory.slice(-8).map(p => 
            `<img src="${p.img}" width="40" style="border: 1px solid #fff; border-radius:5px;">`
        ).join('');

        addLog(`TRẬN CHIẾN: Wave ${wave} - ${zBase.name} xuất hiện!`);

        let fightClock = setInterval(() => {
            currentHp -= totalDmg;
            let percent = Math.max(0, (currentHp/maxHp)*100);
            document.getElementById('hp-fill').style.width = percent + "%";
            document.getElementById('hp-text').innerText = `${Math.max(0, Math.floor(currentHp))}/${maxHp} HP`;

            if (currentHp <= 0) {
                clearInterval(fightClock);
                let reward = 100 + (wave * 30);
                gems += reward;
                addLog(`CHIẾN THẮNG! Nhận ${reward}💎`);
                wave++;
                finishBattle();
            } else if (Math.random() > 0.95 && totalDmg < 50) { 
                clearInterval(fightClock);
                addLog("THẤT BẠI! Cần thêm cây mạnh hơn.");
                finishBattle();
            }
        }, 600);
    }

    function finishBattle() {
        setTimeout(() => {
            document.getElementById('battle-area').style.display = 'none';
            document.getElementById('btn-fight').disabled = false;
            document.getElementById('btn-gacha').disabled = false;
            updateUI();
        }, 1500);
    }

    function updateUI() {
        document.getElementById('gems').innerText = gems;
        document.getElementById('wave').innerText = wave;
        document.getElementById('count').innerText = inventory.length;
    }

    updateUI();
    renderInventory();
</script>
</body>
</html>
