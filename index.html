<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>PvZ Gacha Web - Fixed</title>
    <style>
        body { background: #1a252f; color: #ecf0f1; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        #game-container { max-width: 700px; margin: 0 auto; background: #2c3e50; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid #34495e; }
        .stats { display: flex; justify-content: space-around; background: #27ae60; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; font-size: 18px; border-bottom: 4px solid #1e8449; }
        
        .btn-group { margin-bottom: 20px; }
        .btn { padding: 12px 20px; margin: 5px; cursor: pointer; border-radius: 8px; font-weight: bold; border: none; transition: 0.2s; font-size: 16px; }
        #btn-gacha { background: #e67e22; color: white; border-bottom: 4px solid #d35400; }
        #btn-fight { background: #3498db; color: white; border-bottom: 4px solid #2980b9; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn:active { transform: translateY(2px); border-bottom-width: 0; }
        .btn:disabled { background: #7f8c8d; border: none; cursor: not-allowed; }

        .log { height: 100px; overflow-y: auto; background: #000; padding: 10px; text-align: left; font-family: monospace; font-size: 13px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #444; color: #2ecc71; }
        
        .card-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; min-height: 100px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; }
        .card { background: #34495e; border: 2px solid #95a5a6; border-radius: 8px; padding: 8px; width: 85px; text-align: center; }
        .card img { width: 60px; height: 60px; object-fit: contain; }
        .card p { margin: 5px 0 0 0; font-size: 11px; font-weight: bold; }
        
        .rarity-LEGENDARY { border-color: #f1c40f; box-shadow: 0 0 10px #f1c40f; color: #f1c40f; }

        #arena { display: none; margin: 20px 0; padding: 15px; background: #27ae60; border-radius: 10px; border: 3px solid #1e8449; }
        .hp-bar { width: 100%; height: 20px; background: #555; border-radius: 10px; margin-top: 10px; position: relative; overflow: hidden; }
        #hp-fill { height: 100%; background: #e74c3c; width: 100%; transition: 0.3s; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🌻 PvZ Gacha Web 🧟</h1>
    
    <div class="stats">
        <span>💎 <span id="gems">500</span></span>
        <span>🌊 Wave: <span id="wave">1</span></span>
        <span>🎒 <span id="count">0</span> cây</span>
    </div>

    <div class="btn-group">
        <button class="btn" id="btn-gacha" onclick="rollGacha()">🎲 Quay Gacha (100 Gems)</button>
        <button class="btn" id="btn-fight" onclick="startBattle()">⚔️ Chiến đấu!</button>
    </div>

    <div id="arena">
        <h4 id="battle-status">Đang chiến đấu...</h4>
        <div class="hp-bar"><div id="hp-fill"></div></div>
    </div>

    <div class="log" id="log">Hệ thống: Sẵn sàng!</div>

    <h3>Đội hình của bạn</h3>
    <div class="card-container" id="inventory"></div>
</div>

<script>
    let gems = 500;
    let wave = 1;
    let inventory = [];

    const pool = [
        { name: "Peashooter", dmg: 20, rarity: "COMMON", img: "https://vignette.wikia.nocookie.net/plantsvszombies/images/1/14/PvZ_Peashooter.png" },
        { name: "Sunflower", dmg: 5, rarity: "COMMON", img: "https://vignette.wikia.nocookie.net/plantsvszombies/images/6/6b/PvZ_Sunflower.png" },
        { name: "Snow Pea", dmg: 35, rarity: "RARE", img: "https://vignette.wikia.nocookie.net/plantsvszombies/images/f/f6/PvZ_Snow_Pea.png" },
        { name: "Cherry Bomb", dmg: 150, rarity: "EPIC", img: "https://vignette.wikia.nocookie.net/plantsvszombies/images/3/36/PvZ_Cherry_Bomb.png" },
        { name: "Cob Cannon", dmg: 300, rarity: "LEGENDARY", img: "https://vignette.wikia.nocookie.net/plantsvszombies/images/1/18/PvZ_Cob_Cannon.png" }
    ];

    function addLog(msg) {
        const logBox = document.getElementById('log');
        if(logBox) {
            logBox.innerHTML = `> ${msg}<br>` + logBox.innerHTML;
        }
    }

    function updateUI() {
        document.getElementById('gems').innerText = gems;
        document.getElementById('wave').innerText = wave;
        document.getElementById('count').innerText = inventory.length;
    }

    function rollGacha() {
        if (gems < 100) {
            addLog("Không đủ Gems!");
            return;
        }
        gems -= 100;
        
        let rand = Math.random() * 100;
        let item;
        if (rand < 60) item = pool[Math.floor(Math.random()*2)];
        else if (rand < 90) item = pool[2];
        else if (rand < 98) item = pool[3];
        else item = pool[4];

        inventory.push(item);
        addLog(`Bạn nhận được: ${item.name}!`);
        updateUI();
        renderInventory();
    }

    function renderInventory() {
        const div = document.getElementById('inventory');
        div.innerHTML = inventory.map(p => `
            <div class="card rarity-${p.rarity}">
                <img src="${p.img}" onerror="this.src='https://placehold.co/60?text=Plant'">
                <p>${p.name}</p>
                <p>⚔️${p.dmg}</p>
            </div>
        `).join('');
    }

    function startBattle() {
        if (inventory.length === 0) { addLog("Chưa có cây!"); return; }
        
        const arena = document.getElementById('arena');
        arena.style.display = 'block';
        let totalDmg = inventory.reduce((a, b) => a + b.dmg, 0);
        let zombieHp = wave * 150;
        let currentHp = zombieHp;

        document.getElementById('btn-fight').disabled = true;
        
        let fight = setInterval(() => {
            currentHp -= totalDmg;
            let percent = (currentHp / zombieHp) * 100;
            document.getElementById('hp-fill').style.width = Math.max(0, percent) + "%";
            
            if (currentHp <= 0) {
                clearInterval(fight);
                addLog(`Thắng Wave ${wave}!`);
                gems += 100 + (wave * 20);
                wave++;
                setTimeout(() => { 
                    arena.style.display = 'none'; 
                    document.getElementById('btn-fight').disabled = false;
                    updateUI();
                }, 1500);
            }
        }, 800);
    }
</script>
</body>
</html>
